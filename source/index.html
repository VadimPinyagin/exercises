<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Лисий огород</title>
    <link rel="stylesheet" href="styles/styles.css">
  </head>
  <body>
    <main class="main">
      <section class="garden">
          <h1 class="garden__title">Лисий огород. Version&nbsp;1.0</h1>
          <img src="images/home.svg" width="420" height="330" alt="Лисий дом">
          <div class="fox-barn">
            <ul class="fox-barn__shelf">
              <li class="fox-barn__shelf-item"></li>
              <li class="fox-barn__shelf-item"></li>
              <li class="fox-barn__shelf-item"></li>
              <li class="fox-barn__shelf-item"></li>
              <li class="fox-barn__shelf-item"></li>
              <li class="fox-barn__shelf-item"></li>
              <li class="fox-barn__shelf-item"></li>
              <li class="fox-barn__shelf-item"></li>
            </ul>
          </div>
          <div class="garden__group">
          <button class="garden__group-button button" type="button">
            <span class="visually-hidden">Добавить грядку</span>
          </button>
          <p class="garden__group-illustration">Добавить грядку</p>
        </div>
        <div class="fox-garden">
          <div class="fox-garden__bed fox-garden__bed--mentor">1</div>
          <div class="fox-garden__bed fox-garden__bed--beet">2</div>
          <div class="fox-garden__bed fox-garden__bed--carrot">3</div>
          <div class="fox-garden__bed fox-garden__bed--eggplant">4</div>
          <div class="fox-garden__bed fox-garden__bed--potato">5</div>
          <div class="fox-garden__bed fox-garden__bed--cauliflower">6</div>
          <div class="fox-garden__bed fox-garden__bed--lamb">7</div>
          <div class="fox-garden__bed fox-garden__bed--basilik">8</div>
          <div class="fox-garden__bed fox-garden__bed--fox-roaming">9</div>
          <div class="fox-garden__bed fox-garden__bed--zucchini">10</div>
          <div class="fox-garden__bed fox-garden__bed--cumin">11</div>
          <div class="fox-garden__bed fox-garden__bed--barberry">12</div>
        </div>
        <div class="stall"></div>
      </section>
    </main>
    <script type="module" src="scripts/index.js"></script>
  </body>
</html>
