<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Лисий огород</title>
    <link rel="stylesheet" href="styles/styles.css">
  </head>
  <body>
    <main class="main">
      <section class="garden">
        <h1 class="garden__title">Fox Garden. Version&nbsp;1.1</h1>
        <div class = "garden__home garden__home--rain"></div>
        <div class="garden__barn fox-barn">
          <ul class="fox-barn__shelf">
            <li class="fox-barn__shelf-item"></li>
            <li class="fox-barn__shelf-item fox-barn__shelf--onion"></li>
            <li class="fox-barn__shelf-item fox-barn__shelf--zucchini"></li>
            <li class="fox-barn__shelf-item"></li>
            <li class="fox-barn__shelf-item fox-barn__shelf--pumpkin"></li>
            <li class="fox-barn__shelf-item"></li>
            <li class="fox-barn__shelf-item"></li>
            <li class="fox-barn__shelf-item fox-barn__shelf--cauliflower"></li>
          </ul>
          <div class="garden__stall stall"></div>
        </div>
        <div class="garden__button">
          <button class="garden__button-add-gardenbed button" type="button">
            <span class="visually-hidden">Добавить грядку для овощей</span>
          </button>
          <button class="garden__button-remove-gardenbed button" type="button">
            <span class="visually-hidden">Убрать грядку для овощей</span>
          </button>
          <button class="garden__button-add-flowerbed button" type="button">
            <span class="visually-hidden">Добавить грядку для цветов</span>
          </button>
          <button class="garden__button-remove-flowerbed button" type="button">
            <span class="visually-hidden">Убрать грядку для цветов</span>
          </button>
        </div>
        <div class="flower-garden">
          <div class="flower-garden__flowerbed">1</div>
          <div class="flower-garden__flowerbed">2</div>
          <div class="flower-garden__flowerbed">3</div>
          <div class="flower-garden__flowerbed">4</div>
          <div class="flower-garden__flowerbed">5</div>
        </div>
        <div class="fox-garden">
          <div class="fox-garden__bed fox-garden__bed--tomato">1</div>
          <div class="fox-garden__bed fox-garden__bed--beet">2</div>
          <div class="fox-garden__bed fox-garden__bed--carrot">3</div>
          <div class="fox-garden__bed fox-garden__bed--eggplant">4</div>
          <div class="fox-garden__bed fox-garden__bed--potato">5</div>
          <div class="fox-garden__bed fox-garden__bed--cauliflower">6</div>
          <div class="fox-garden__bed ">7</div>
          <div class="fox-garden__bed fox-garden__bed--basilik">8</div>
          <div class="fox-garden__bed">9</div>
          <div class="fox-garden__bed fox-garden__bed--cucumber">10</div>
          <div class="fox-garden__bed fox-garden__bed--cumin">11</div>
          <div class="fox-garden__bed fox-garden__bed--barberry">12</div>
          <div class="fox-garden__bed">13</div>
          <div class="fox-garden__bed">14</div>
          <div class="fox-garden__bed fox-garden__bed--cilantro">15</div>
          <div class="fox-garden__bed fox-garden__bed--cilantro">16</div>
          <div class="fox-garden__bed fox-garden__bed--dill">17</div>
          <div class="fox-garden__bed fox-garden__bed--cilantro">18</div>
        </div>
      </section>
    </main>
    <script type="module" src="scripts/index.js"></script>
  </body>
</html>
